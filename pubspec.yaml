name: health_companion
description: "A medication, reminders, and health document companion app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local persistence (offline-first, no backend required for MVP)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Equality / value objects
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Camera + image handling
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image_cropper: ^8.0.2

  # PDF + image viewing
  pdfx: ^2.9.0
  photo_view: ^0.15.0
  open_filex: ^4.5.0
  share_plus: ^10.0.0
  path: ^1.9.0

  # Local notifications (medication + appointment reminders, no backend)
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Auth UI dependencies (mock-backed for MVP; swap in firebase_auth / google_sign_in later)
  google_sign_in: ^6.2.1
  pin_code_fields: ^8.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
